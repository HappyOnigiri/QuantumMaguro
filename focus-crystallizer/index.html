<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Crystallizer</title>
</head>

<body>
  <div class="background-anim"></div>

  <canvas id="crystal-canvas"></canvas>

  <main class="ui-panel">
    <header>
      <h1>Focus Crystallizer</h1>
      <p class="subtitle">Focus your mind, grow your crystal.</p>
    </header>

    <section class="timer-display" id="timer-display">
      05:00
    </section>

    <div class="message-area" id="message-area">
      Ready to focus?
    </div>

    <div class="controls">
      <div class="duration-selector">
        <button data-duration="1" class="duration-btn">1m</button>
        <button data-duration="5" class="duration-btn active">5m</button>
        <button data-duration="10" class="duration-btn">10m</button>
        <button data-duration="25" class="duration-btn">25m</button>
      </div>

      <button id="start-btn" class="primary-btn">Start Focus</button>
      <button id="stop-btn" class="secondary-btn" style="display: none;">Give Up</button>
    </div>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
