name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run CI
        run: make ci
        env:
          CI: true

      - name: Check for unexpected diffs
        run: |
          if ! git diff --exit-code; then
            echo "CI tasks modified some files. Please run 'make ci' locally and commit the changes."
            exit 1
          fi
