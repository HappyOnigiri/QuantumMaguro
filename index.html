<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ONIGIRI GAME PORTAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./portal.css" />
    <link
      rel="icon"
      type="image/x-icon"
      href="./src/assets/icons/favicon.ico"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./src/assets/icons/icon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./src/assets/icons/icon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./src/assets/icons/apple-touch-icon-180x180.png"
    />
  </head>

  <body>
    <div class="cyber-scanlines"></div>
    <div class="cyber-container">
      <header class="cyber-header">
        <div class="cyber-glitch" data-text="ONIGIRI GAME PORTAL">
          ONIGIRI GAME PORTAL
        </div>
      </header>
      <main class="grid">
        <!-- PORTAL_CARDS -->
      </main>
      <footer class="cyber-footer">
        <div class="footer-content">
          <div class="footer-info">
            <p class="copyright">
              &copy; 2026 HappyOnigiri. All rights reserved.
            </p>
            <div class="footer-links">
              <a
                href="https://x.com/H_OnigiriWorks"
                target="_blank"
                rel="noopener noreferrer"
                title="X (Twitter)"
                class="social-link x-link"
              >
                <img
                  src="@shared/logos/logo_x.svg"
                  alt="X"
                  width="18"
                  height="18"
                />
              </a>
              <a
                href="https://github.com/HappyOnigiri/game-portal"
                target="_blank"
                rel="noopener noreferrer"
                title="GitHub"
                class="social-link github-link"
              >
                <img
                  src="@shared/logos/logo_github.svg"
                  alt="GitHub"
                  width="20"
                  height="20"
                />
              </a>
            </div>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
