<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>量子マグロ亭</title>
    <meta
      name="description"
      content="回転寿司がテーマの爽快タイピングゲーム！流れてくる寿司ネタをローマ字入力して高得点を目指そう。量子マグロやコンボボーナスでスコアアップ。ブラウザで遊べる無料ゲーム。"
    />
    <meta
      name="keywords"
      content="タイピング, ゲーム, 寿司, 回転寿司, 無料, ブラウザゲーム, タイピング練習, 量子マグロ亭, HappyOnigiri"
    />
    <meta name="author" content="HappyOnigiri" />
    <meta name="theme-color" content="#00f3ff" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://onigiri-game-portal.vercel.app/quantum-maguro/"
    />
    <meta property="og:title" content="タイピング回転寿司 量子マグロ亭" />
    <meta
      property="og:description"
      content="回転寿司がテーマの爽快タイピングゲーム！流れてくる寿司ネタをローマ字入力して高得点を目指そう。"
    />
    <meta
      property="og:image"
      content="https://onigiri-game-portal.vercel.app/thumbnails/quantum-maguro.png"
    />
    <meta property="og:site_name" content="量子マグロ亭" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:url"
      content="https://onigiri-game-portal.vercel.app/quantum-maguro/"
    />
    <meta property="twitter:title" content="タイピング回転寿司 量子マグロ亭" />
    <meta
      property="twitter:description"
      content="回転寿司がテーマの爽快タイピングゲーム！流れてくる寿司ネタをローマ字入力して高得点を目指そう。"
    />
    <meta
      property="twitter:image"
      content="https://onigiri-game-portal.vercel.app/thumbnails/quantum-maguro.png"
    />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "タイピング回転寿司 量子マグロ亭",
        "operatingSystem": "Web Browser",
        "applicationCategory": "GameApplication",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "JPY"
        },
        "description": "回転寿司がテーマの爽快タイピングゲーム。流れてくる寿司ネタをローマ字入力して高得点を目指します。",
        "author": {
          "@type": "Person",
          "name": "HappyOnigiri",
          "url": "https://github.com/HappyOnigiri"
        }
      }
    </script>

    <link rel="icon" href="./src/assets/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Fira+Code:wght@400;700&family=Orbitron:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Title Screen -->
      <div id="title-screen">
        <div
          style="
            font-family: &quot;Orbitron&quot;, sans-serif;
            font-size: 1.2rem;
            color: var(--cyber-blue);
            letter-spacing: 0.2em;
            margin-bottom: 0.5em;
            text-shadow: 0 0 10px var(--cyber-blue);
          "
          data-i18n="qm.subtitle"
        >
          TYPING ROLLING SUSHI
        </div>
        <h1 data-i18n="qm.title">量子マグロ亭</h1>
        <div class="title-image-container">
          <img
            src="./src/assets/quantum-maguro.png"
            alt="量子マグロ"
            class="title-image"
          />
        </div>
        <div class="rules" data-i18n="qm.rules" data-i18n-html>
          [MISSION OBJECTIVES]<br />
          &gt; TARGET: 流れてくる寿司のローマ字をタイプ<br />
          &gt; SYSTEM: 1文字打つたびに全ターゲット判定<br />
          &gt; BONUS: 複数同時撃破でスコア増幅
        </div>
        <div class="start-btn-container">
          <button class="start-btn" id="start-btn" data-i18n="qm.start_normal">
            通常 START
          </button>
          <button
            class="start-btn tokujo-btn"
            id="tokujo-btn"
            data-i18n="qm.start_tokujo"
          >
            特上 START
          </button>
        </div>
      </div>

      <!-- Game Screen -->
      <div id="game-screen">
        <div id="game-header">
          <div class="header-item">
            <span class="header-label">SCORE</span>
            <span class="header-value" id="score-value">0</span>
          </div>
          <div class="header-item">
            <span class="header-label">COMBO</span>
            <span class="header-value" id="combo-value">0</span>
          </div>
          <div class="header-item">
            <span class="header-label">TIME</span>
            <span class="header-value" id="time-value">60</span>
          </div>
          <button
            id="keyboard-toggle-btn"
            class="icon-btn"
            title="Toggle Keyboard"
          >
            ⌨️
          </button>
        </div>
        <div id="lane-area">
          <div id="belt"></div>
        </div>
        <div id="input-area">
          <div id="input-display"></div>
          <div id="input-hint" data-i18n="qm.input_hint">
            キーボードで寿司を打とう
          </div>
        </div>
        <div id="taisho-area">
          <div class="taisho-container">
            <div id="taisho-emoji"></div>
            <div id="taisho-bubble">いらっしゃい！何でも握るよ！</div>
          </div>
        </div>
        <div id="keyboard-area"></div>
      </div>

      <div id="result-screen">
        <h2 data-i18n="qm.result_title">おあいそ！</h2>
        <div id="result-mode"></div>
        <div id="result-rank-emoji"></div>
        <div id="result-rank-name"></div>
        <div id="result-rank-comment"></div>
        <div class="result-stats">
          <div class="result-stat">
            <div class="result-stat-label">SCORE</div>
            <div class="result-stat-value" id="result-score"></div>
          </div>
          <div class="result-stat">
            <div class="result-stat-label" data-i18n="qm.stat_plates">皿数</div>
            <div class="result-stat-value" id="result-plates"></div>
          </div>
          <div class="result-stat">
            <div class="result-stat-label" data-i18n="qm.stat_max_combo">
              最大コンボ
            </div>
            <div class="result-stat-value" id="result-combo"></div>
          </div>
          <div class="result-stat">
            <div class="result-stat-label" data-i18n="qm.stat_max_simul">
              最大同時取り
            </div>
            <div class="result-stat-value" id="result-simul"></div>
          </div>
        </div>
        <div id="result-taisho"></div>
        <div>
          <button class="result-btn" id="share-btn" data-i18n="qm.share_btn">
            𝕏 で結果をポスト
          </button>
          <button
            class="result-btn"
            id="top-btn"
            data-i18n="qm.back_to_top_btn"
          >
            🍣 トップに戻る
          </button>
        </div>
      </div>

      <div id="countdown-overlay"></div>
      <div id="combo-burst"></div>

      <footer class="app-footer">
        <div class="footer-content">
          <p>
            &copy; 2026 HappyOnigiri. All rights reserved.
            <span id="app-version"></span>
          </p>
          <div
            style="
              display: flex;
              gap: 1.5rem;
              align-items: center;
              justify-content: center;
              flex-wrap: wrap;
            "
          >
            <div class="footer-links">
              <a
                href="https://x.com/H_OnigiriWorks"
                target="_blank"
                rel="noopener noreferrer"
                title="X (Twitter)"
                class="x-link"
              >
                <img
                  src="@shared/logos/logo_x.svg"
                  alt="X"
                  width="18"
                  height="18"
                />
              </a>
              <a
                href="https://github.com/HappyOnigiri/QuantumMaguro"
                target="_blank"
                rel="noopener noreferrer"
                title="GitHub"
                class="github-link"
              >
                <img
                  src="@shared/logos/logo_github.svg"
                  alt="GitHub"
                  width="20"
                  height="20"
                />
              </a>
            </div>
            <div
              class="lang-switcher"
              style="
                display: flex;
                align-items: center;
                gap: 0.5rem;
                font-family: &quot;Orbitron&quot;, sans-serif;
                font-size: 0.8rem;
                opacity: 0.7;
              "
            >
              <button
                data-lang-btn="en"
                style="
                  background: none;
                  border: none;
                  color: inherit;
                  cursor: pointer;
                  padding: 0.2rem;
                  transition: color 0.3s;
                  font-family: inherit;
                "
              >
                EN
              </button>
              <span style="opacity: 0.5">|</span>
              <button
                data-lang-btn="ja"
                style="
                  background: none;
                  border: none;
                  color: inherit;
                  cursor: pointer;
                  padding: 0.2rem;
                  transition: color 0.3s;
                  font-family: inherit;
                "
              >
                JP
              </button>
            </div>
          </div>
        </div>
      </footer>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
