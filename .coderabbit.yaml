# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "ja-JP"

reviews:
  path_instructions:
    - path: "**/*"
      instructions: |
        「今のところは許容できるが、将来的には対応したほうがよい」といったニュアンスのレビューコメントは投稿しないでください。
        本当に問題があり、対応が必要な事項のみを指摘してください。
        将来の改善に関するアドバイスや優先度の低い提案は避けてください。
        コードのフォーマットや軽微なリファクタリングに関する指摘は行わないでください。
        ただし、重要な洞察や論理的な問題が含まれる場合、「Nitpick」としての指摘は許可します。

  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  sequence_diagrams: false
  collapse_walkthrough: true
  review_status: true
  enable_prompt_for_ai_agents: true
  in_progress_fortune: false
  path_filters:
    - "!node_modules/**"
    - "!dist/**"
    - "!tmp/**"
    - "!.ruff_cache/**"
    - "!package-lock.json"
    - "!**/*.min.js"
    - "!**/*.map"
  tools:
    languagetool:
      enabled: false
    markdownlint:
      enabled: false
    shellcheck:
      enabled: false
    ast-grep:
      enabled: false
    biome:
      enabled: false
    eslint:
      enabled: false
    ruff:
      enabled: false
    phpstan:
      enabled: false
    phpmd:
      enabled: false
    checkov:
      enabled: false
    detekt:
      enabled: false
    cppcheck:
      enabled: false
    semgrep:
      enabled: false
    circleci:
      enabled: false
    pylint:
      enabled: false
    dotenvLint:
      enabled: false
    htmlhint:
      enabled: false
    osvScanner:
      enabled: false
    swiftlint:
      enabled: false
    hadolint:
      enabled: false
  auto_review:
    enabled: true
    drafts: false
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 0
    ignore_title_keywords:
      - "chore(main): release"
