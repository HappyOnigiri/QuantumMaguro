    <!-- JSON-LD 構造化データ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "メスガキポンポン",
        "operatingSystem": "Web Browser",
        "applicationCategory": "GameApplication",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "JPY"
        },
        "description": "生意気なメスガキとの白熱ポンゲーム。ボールを打ち返して高得点を目指します。",
        "author": {
          "@type": "Person",
          "name": "HappyOnigiri",
          "url": "https://github.com/HappyOnigiri"
        }
      }
    </script>
    <link
      rel="icon"
      type="image/x-icon"
      href="./src/assets/icons/favicon.ico"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./src/assets/icons/icon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./src/assets/icons/icon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./src/assets/icons/apple-touch-icon-180x180.png"
    />
  </head>

  <body>
    <a
      href="https://onigiri-portal.vercel.app/"
      class="back-link"
      data-i18n="back_to_portal_html"
      data-i18n-html
      ><span class="back-icon">←</span> BACK TO PORTAL</a
    >
    <div id="app">
      <div id="game-wrapper">
        <div id="game-container">
          <canvas id="gameCanvas" width="800" height="600"></canvas>
          <div id="ui-layer">
            <img
              src="./src/assets/start_screen.png"
              id="start-screen-img"
              alt="Start Screen"
            />
            <h1 id="titleText" data-i18n="mp.title">MESUGAKI PONG</h1>
            <p id="descText" data-i18n="mp.desc">
              ボールを打ち返せ！ただし、何かおかしいかも……？
            </p>
            <button id="start-btn" data-i18n="mp.start">START</button>
            <a
              href="../guidelines.html"
              target="_blank"
              rel="noopener noreferrer"
              class="sub-guidelines-link"
              data-i18n="mp.guidelines"
              >▶ 配信・収益化OK</a
            >
          </div>
          <div id="annoying-message"></div>
        </div>
      </div>
      <footer class="app-footer">
        <div class="footer-content">
          <p>
            &copy; 2026 HappyOnigiri. All rights reserved.
            <span id="app-version"></span>
          </p>
          <div
            style="
              display: flex;
              gap: 1.5rem;
              align-items: center;
              justify-content: center;
              flex-wrap: wrap;
            "
          >
            <div class="footer-links">
              <a
                href="https://x.com/H_OnigiriWorks"
                target="_blank"
                rel="noopener noreferrer"
                title="X (Twitter)"
                class="x-link"
              >
                <img
                  src="@shared/logos/logo_x.svg"
                  alt="X"
                  width="18"
                  height="18"
                />
              </a>
              <a
                href="https://github.com/HappyOnigiri/GamePortal"
                target="_blank"
                rel="noopener noreferrer"
                title="GitHub"
                class="github-link"
              >
                <img
                  src="@shared/logos/logo_github.svg"
                  alt="GitHub"
                  width="20"
                  height="20"
                />
              </a>
            </div>
            <div
              class="lang-switcher"
              style="
                display: flex;
                align-items: center;
                gap: 0.5rem;
                font-family: &quot;Orbitron&quot;, sans-serif;
                font-size: 0.8rem;
                opacity: 0.7;
              "
            >
              <button
                data-lang-btn="en"
                style="
                  background: none;
                  border: none;
                  color: inherit;
                  cursor: pointer;
                  padding: 0.2rem;
                  transition: color 0.3s;
                  font-family: inherit;
                "
              >
                EN
              </button>
              <span style="opacity: 0.5">|</span>
              <button
                data-lang-btn="ja"
                style="
                  background: none;
                  border: none;
                  color: inherit;
                  cursor: pointer;
                  padding: 0.2rem;
                  transition: color 0.3s;
                  font-family: inherit;
                "
              >
                JP
              </button>
            </div>
          </div>
        </div>
      </footer>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
